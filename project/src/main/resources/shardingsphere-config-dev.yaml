databaseName: link_db
mode:
  type: Standalone
  repository:
    type: JDBC

dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/link?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: root

rules:
  - !SHARDING
    tables:
      t_link:
        # 你的真实表是 t_link_0 ... t_link_15
        actualDataNodes: ds_0.t_link_${0..15}
        tableStrategy:
          standard:
            shardingColumn: gid
            shardingAlgorithmName: t_link_mod
      t_link_goto:
        actualDataNodes: ds_0.t_link_goto_${0..15}
        tableStrategy:
          standard:
            shardingColumn: full_short_url
            shardingAlgorithmName: t_link_goto_mod
      # 分组表分片
      t_group:
        actualDataNodes: ds_0.t_group_${0..15}
        tableStrategy:
          standard:
            shardingColumn: username
            shardingAlgorithmName: group_table_inline # 改个名字区分

    shardingAlgorithms:
      # ✅ 修正点：使用 MOD 算法，而不是 HASH_MOD
      # HASH_MOD 是先哈希再取模，MOD 是直接取模 (如果你 gid 是数字)
      # 如果 gid 是字符串，必须用 INLINE 配合 groovy 脚本

      # 假设你的 gid 是 long 类型，或者你想用简单的 hash 取模：
      t_link_mod:
        type: INLINE
        props:
          algorithm-expression: t_link_${Math.abs(gid.hashCode()) % 16}

      t_link_goto_mod:
        type: INLINE
        props:
          algorithm-expression: t_link_goto_${Math.abs(full_short_url.hashCode()) % 16}

      group_table_inline:
        type: INLINE
        props:
          algorithm-expression: t_group_${Math.abs(username.hashCode()) % 16}
  # 添加单表加载规则
  - !SINGLE
    tables:
      # 语法：*.* 代表“加载所有未被分片的表”
      # ShardingSphere 会自动扫描 ds_0，发现 t_link_access_stats 并加载它
      - "*.*"
    # 指定默认数据源（当存在多个数据源时必填，单个数据源时可选但建议加上）
    defaultDataSource: ds_0

props:
  sql-show: true