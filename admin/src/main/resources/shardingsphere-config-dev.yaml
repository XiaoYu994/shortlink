# 1. 必填：逻辑库名
databaseName: admin_db

# 2. 必填：运行模式 (5.4.x 强制要求)
mode:
  type: Standalone
  repository:
    type: JDBC

# 3. 数据源
dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    # 注意：这里请确认你的数据库名是 link 还是其他的？
    # 如果 user 表在 link 库，就用 link；如果在单独的库，请修改这里
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/link?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root

rules:
  # ===========================
  # 分片规则 (Sharding)
  # ===========================
  - !SHARDING
    tables:
      # 用户表分片
      t_user:
        actualDataNodes: ds_0.t_user_${0..15}
        tableStrategy:
          standard:
            shardingColumn: username
            shardingAlgorithmName: user_table_inline # 改个名字区分
      # 分组表分片
      t_group:
        actualDataNodes: ds_0.t_group_${0..15}
        tableStrategy:
          standard:
            shardingColumn: username
            shardingAlgorithmName: group_table_inline # 改个名字区分

    shardingAlgorithms:
      # ✅ 核心修复：使用 INLINE 算法处理字符串 Hash
      # 也就是对 username 进行 hashCode 取绝对值，然后对 16 取模
      user_table_inline:
        type: INLINE
        props:
          algorithm-expression: t_user_${Math.abs(username.hashCode()) % 16}

      group_table_inline:
        type: INLINE
        props:
          algorithm-expression: t_group_${Math.abs(username.hashCode()) % 16}

  # ===========================
  # 加密规则 (Encrypt) - 5.4.1 新语法
  # ===========================
  - !ENCRYPT
    tables:
      t_user:
        columns:
          phone:
            # 5.4.x 写法变了：cipher 是一个对象
            cipher:
              name: phone # 数据库里真实的列名
              encryptorName: common_encryptor
          mail:
            cipher:
              name: mail
              encryptorName: common_encryptor

    encryptors:
      common_encryptor:
        type: AES
        props:
          aes-key-value: d6oadCl789rrb9A3GWo
  # 添加单表加载规则
  - !SINGLE
    tables:
      # 语法：*.* 代表“加载所有未被分片的表”
      # ShardingSphere 会自动扫描 ds_0，发现 t_link_access_stats 并加载它
      - "*.*"
    # 指定默认数据源（当存在多个数据源时必填，单个数据源时可选但建议加上）
    defaultDataSource: ds_0
props:
  sql-show: true