name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: 部署范围
        required: true
        default: app
        type: choice
        options:
          - app
          - full
          - infra
      image_tag:
        description: 镜像标签，默认使用当前工作流提交 SHA
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: shortlink-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "${IMAGE_TAG}" ]; then
            IMAGE_TAG="${GITHUB_SHA}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker,deploy,resources/database/link.sql"
          target: "/opt/shortlink"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 2m
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd /opt/shortlink
            cat > docker/.env <<'EOF'
            GHCR_IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
            SPRING_PROFILES_ACTIVE=aggregation
            DATABASE_ENV=prod
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD || 'root' }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD || 'xhy_redis' }}
            SHORT_LINK_DOMAIN_DEFAULT=${{ secrets.SHORT_LINK_DOMAIN_DEFAULT }}
            SHORT_LINK_STATS_LOCALE_AMAP_KEY=${{ secrets.SHORT_LINK_STATS_LOCALE_AMAP_KEY }}
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
            GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            EOF
            chmod +x deploy/setup-server.sh
            bash deploy/setup-server.sh "${{ inputs.deploy_scope }}"
