server:
  port: 8001
  tomcat:
    threads:
      max: 500       # 最大工作线程数，推荐 400-800
      min-spare: 50  # 最小空闲线程数，推荐 50-100
    connection-timeout: 20000

spring:
  application:
    name: shortlink-project-service
  datasource:
    # ShardingSphere 对 Driver 自定义，实现分库分表等隐藏逻辑
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # ShardingSphere 配置文件路径
    url: jdbc:shardingsphere:classpath:shardingsphere-config-${database.env:dev}.yaml
  mvc:
    view:
      prefix: /templates/
      suffix: .html
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: xhy_redis
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 枚举类型处理器
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath:mapper/*.xml

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: short-link-producer-group # 必须配置一个默认的生产者组
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1

framework:
  cache:
    redis:
      bloom-filter:
        short-link-create:
          name: shortlink_uri_create_cache_penetration_bloom_filter
          expectedInsertions: 100000000
          falseProbability: 0.001

short-link:
  cache:
    local:
      initial-capacity: 100
      maximum-size: 10000
      expire-after-write: 30
  # 创建短链接 支持 bloom-filter 和  distributed-lock
  create:
    strategy: bloom-filter
  domain:
    default: nurl.ink:8001
  cold-data:
    enabled: true
    days: 90
    batch-size: 200
    cron: "0 30 2 * * ?"
    rehot:
      threshold: 1000
    grace-days: 30
  goto-domain:
    white-list:
      enable: false
      names: '拿个offer,知乎,掘金,博客园,github'
      details:
        - nageoffer.com
        - zhihu.com
        - juejin.cn
        - cnblogs.com
        - github.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
