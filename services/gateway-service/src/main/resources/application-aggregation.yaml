spring:
  cloud:
    gateway:
      routes:
        - id: shortlink-aggregation-notification-ws
          uri: lb:ws://shortlink-aggregation-service
          predicates:
            - Path=/api/short-link/admin/v1/notification/ws
          filters:
            - name: TokenValidate
              args:
                whitePathList: []

        - id: shortlink-aggregation-admin
          uri: lb://shortlink-aggregation-service
          predicates:
            - Path=/api/short-link/admin/**
          filters:
            - name: TokenValidate
              args:
                whitePathList:
                  - /api/short-link/admin/v1/user/login
                  - /api/short-link/admin/v1/user/has-username

        - id: shortlink-stats-service
          uri: lb://shortlink-stats-service
          predicates:
            - Path=/api/short-link/v1/stats/**
          filters:
            - name: TokenValidate
              args:
                whitePathList: []

        - id: shortlink-aggregation-project
          uri: lb://shortlink-aggregation-service
          predicates:
            - Path=/api/short-link/**
          filters:
            - name: TokenValidate
              args:
                whitePathList: []
