    name: shortlink-user-service-test
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config-test.yaml
  data:
    redis:
      host: 127.0.0.1
