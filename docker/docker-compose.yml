name: "RocketMq"
services:
  # 1. NameServer 服务
  namesrv:
    image: apache/rocketmq:5.3.0
    container_name: rmqnamesrv
    ports:
      - 9876:9876
    networks:
      - rocketmq
    command: sh mqnamesrv
    volumes:
      - namesrv_logs:/home/rocketmq/logs
      - namesrv_store:/home/rocketmq/store

  # 2. Broker 服务
  broker:
    image: apache/rocketmq:5.3.0
    container_name: rmqbroker
    ports:
      - 10909:10909
      - 10911:10911
      - 10912:10912
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - AUTO_CREATE_TOPIC_ENABLE=true
    depends_on:
      - namesrv
    networks:
      - rocketmq
    command: sh mqbroker -n rmqnamesrv:9876 -c /home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    volumes:
      - broker_logs:/home/rocketmq/logs
      - broker_store:/home/rocketmq/store
    configs:
      - source: broker_conf
        target: /home/rocketmq/rocketmq-5.3.0/conf/broker.conf

  # 3. Dashboard 可视化控制台
  dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rocketmq-dashboard
    ports:
      - 8080:8082
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rmqnamesrv:9876
    depends_on:
      - namesrv
    networks:
      - rocketmq

  # 4. Prometheus 监控采集
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: shortlink-prometheus
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - alertmanager
    networks:
      - rocketmq

  # 5. Alertmanager 告警路由
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: shortlink-alertmanager
    ports:
      - 9093:9093
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - rocketmq

  # 6. Grafana 仪表盘
  grafana:
    image: grafana/grafana:11.1.0
    container_name: shortlink-grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rocketmq

configs:
  broker_conf:
    content: |
      brokerClusterName = DefaultCluster
      brokerName = broker-a
      brokerId = 0
      deleteWhen = 04
      fileReservedTime = 48
      brokerRole = ASYNC_MASTER
      flushDiskType = ASYNC_FLUSH
      brokerIP1 = 127.0.0.1
      # 最大延迟消息时间，默认 259200s(3天)，调整为 365 天
      timerMaxDelaySec = 31536000

volumes:
  namesrv_logs:
  namesrv_store:
  broker_logs:
  broker_store:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  rocketmq:
    driver: bridge
