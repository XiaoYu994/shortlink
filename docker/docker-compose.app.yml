services:
  gateway:
    image: ghcr.io/xiaoyu994/shortlink-gateway-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
    networks:
      - shortlink

  aggregation:
    image: ghcr.io/xiaoyu994/shortlink-aggregation-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-aggregation
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SHORT_LINK_DOMAIN_DEFAULT: ${SHORT_LINK_DOMAIN_DEFAULT}
      SHORTLINK_MYSQL_HOST: mysql
      SHORTLINK_MYSQL_PORT: 3306
      SHORTLINK_MYSQL_USERNAME: root
      SHORTLINK_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: link
      SHORTLINK_MYSQL_COLD_DATABASE: link_cold
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    networks:
      - shortlink

  stats:
    image: ghcr.io/xiaoyu994/shortlink-stats-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-stats
    restart: unless-stopped
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SHORT_LINK_STATS_LOCALE_AMAP_KEY: ${SHORT_LINK_STATS_LOCALE_AMAP_KEY}
      SHORTLINK_MYSQL_HOST: mysql
      SHORTLINK_MYSQL_PORT: 3306
      SHORTLINK_MYSQL_USERNAME: root
      SHORTLINK_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: link
      SHORTLINK_MYSQL_COLD_DATABASE: link_cold
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    networks:
      - shortlink

  risk:
    image: ghcr.io/xiaoyu994/shortlink-risk-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-risk
    restart: unless-stopped
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      ROCKETMQ_NAME_SERVER: namesrv:9876
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SHORTLINK_MYSQL_HOST: mysql
      SHORTLINK_MYSQL_PORT: 3306
      SHORTLINK_MYSQL_USERNAME: root
      SHORTLINK_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: link
      SHORTLINK_MYSQL_COLD_DATABASE: link_cold
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    networks:
      - shortlink

  frontend:
    image: ghcr.io/xiaoyu994/shortlink-frontend:${GHCR_IMAGE_TAG}
    container_name: shortlink-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - shortlink

networks:
  shortlink:
    name: shortlink-network
    driver: bridge
