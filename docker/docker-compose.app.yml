services:
  gateway:
    image: ghcr.io/xiaoyu994/shortlink-gateway-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR}
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME}
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shortlink

  aggregation:
    image: ghcr.io/xiaoyu994/shortlink-aggregation-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-aggregation
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR}
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME}
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD}
      ROCKETMQ_NAME_SERVER: ${ROCKETMQ_NAME_SERVER}
      SHORT_LINK_DOMAIN_DEFAULT: ${SHORT_LINK_DOMAIN_DEFAULT}
      SHORTLINK_MYSQL_HOST: ${SHORTLINK_MYSQL_HOST}
      SHORTLINK_MYSQL_PORT: ${SHORTLINK_MYSQL_PORT}
      SHORTLINK_MYSQL_USERNAME: ${SHORTLINK_MYSQL_USERNAME}
      SHORTLINK_MYSQL_PASSWORD: ${SHORTLINK_MYSQL_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: ${SHORTLINK_MYSQL_DATABASE}
      SHORTLINK_MYSQL_COLD_DATABASE: ${SHORTLINK_MYSQL_COLD_DATABASE}
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shortlink

  stats:
    image: ghcr.io/xiaoyu994/shortlink-stats-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-stats
    restart: unless-stopped
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR}
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME}
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD}
      ROCKETMQ_NAME_SERVER: ${ROCKETMQ_NAME_SERVER}
      SHORT_LINK_STATS_LOCALE_AMAP_KEY: ${SHORT_LINK_STATS_LOCALE_AMAP_KEY}
      SHORTLINK_MYSQL_HOST: ${SHORTLINK_MYSQL_HOST}
      SHORTLINK_MYSQL_PORT: ${SHORTLINK_MYSQL_PORT}
      SHORTLINK_MYSQL_USERNAME: ${SHORTLINK_MYSQL_USERNAME}
      SHORTLINK_MYSQL_PASSWORD: ${SHORTLINK_MYSQL_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: ${SHORTLINK_MYSQL_DATABASE}
      SHORTLINK_MYSQL_COLD_DATABASE: ${SHORTLINK_MYSQL_COLD_DATABASE}
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shortlink

  risk:
    image: ghcr.io/xiaoyu994/shortlink-risk-service:${GHCR_IMAGE_TAG}
    container_name: shortlink-risk
    restart: unless-stopped
    environment:
      DATABASE_ENV: ${DATABASE_ENV}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR}
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME}
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD}
      ROCKETMQ_NAME_SERVER: ${ROCKETMQ_NAME_SERVER}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SHORTLINK_MYSQL_HOST: ${SHORTLINK_MYSQL_HOST}
      SHORTLINK_MYSQL_PORT: ${SHORTLINK_MYSQL_PORT}
      SHORTLINK_MYSQL_USERNAME: ${SHORTLINK_MYSQL_USERNAME}
      SHORTLINK_MYSQL_PASSWORD: ${SHORTLINK_MYSQL_PASSWORD}
      SHORTLINK_MYSQL_DATABASE: ${SHORTLINK_MYSQL_DATABASE}
      SHORTLINK_MYSQL_COLD_DATABASE: ${SHORTLINK_MYSQL_COLD_DATABASE}
      SPRING_DATASOURCE_URL: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml?placeholder-type=environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shortlink

  frontend:
    image: ghcr.io/xiaoyu994/shortlink-frontend:${GHCR_IMAGE_TAG}
    container_name: shortlink-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - shortlink

networks:
  shortlink:
    name: shortlink-network
    driver: bridge
