services:
  mysql:
    image: mysql:8.4
    container_name: shortlink-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: link
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init/01-init-link.sh:/docker-entrypoint-initdb.d/01-init-link.sh:ro
      - ../resources/database/link.sql:/opt/bootstrap/link.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - shortlink

  redis:
    image: redis:7.2-alpine
    container_name: shortlink-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - shortlink

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: shortlink-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    networks:
      - shortlink

  namesrv:
    image: apache/rocketmq:5.3.0
    container_name: shortlink-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    volumes:
      - namesrv_logs:/home/rocketmq/logs
      - namesrv_store:/home/rocketmq/store
    networks:
      - shortlink

  broker:
    image: apache/rocketmq:5.3.0
    container_name: shortlink-broker
    restart: unless-stopped
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: namesrv:9876
      AUTO_CREATE_TOPIC_ENABLE: "true"
    depends_on:
      - namesrv
    command: sh mqbroker -n namesrv:9876 -c /home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    volumes:
      - broker_logs:/home/rocketmq/logs
      - broker_store:/home/rocketmq/store
    configs:
      - source: broker_conf
        target: /home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    networks:
      - shortlink

configs:
  broker_conf:
    content: |
      brokerClusterName = DefaultCluster
      brokerName = broker-a
      brokerId = 0
      deleteWhen = 04
      fileReservedTime = 48
      brokerRole = ASYNC_MASTER
      flushDiskType = ASYNC_FLUSH
      brokerIP1 = broker
      timerMaxDelaySec = 31536000

volumes:
  mysql_data:
  redis_data:
  nacos_data:
  nacos_logs:
  namesrv_logs:
  namesrv_store:
  broker_logs:
  broker_store:

networks:
  shortlink:
    name: shortlink-network
    driver: bridge
